services:
  - type: web
    name: prostapp-ml-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ml_services:app --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4
    rootDir: app/backend/server
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
